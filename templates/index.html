<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园智能办事助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* 用户信息区域样式 - 放在 header 右侧 */
        .user-info-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
        }

        .user-info-bar .username {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
        }

        .user-info-bar .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .user-info-bar .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 未登录提示 */
        .login-prompt {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-prompt-content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
        }

        .login-prompt-content h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .login-prompt-content p {
            color: #666;
            margin-bottom: 20px;
        }

        .login-prompt-content .btn-login-now {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-prompt-content .btn-login-now:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- 未登录提示 -->
    <div class="login-prompt" id="loginPrompt" style="display: none;">
        <div class="login-prompt-content">
            <h2>🔒 请先登录</h2>
            <p>登录后才能使用校园智能办事助手</p>
            <button class="btn-login-now" onclick="window.location.href='/login'">立即登录</button>
        </div>
    </div>

    <div class="app-container" id="appContainer" style="display: none;">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🎓</span>
                    <h1>校园智能助手</h1>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h3>快捷服务</h3>
                    <button class="nav-item" data-intent="course">
                        <span class="nav-icon">📚</span>课程咨询
                    </button>
                    <button class="nav-item" data-intent="scholarship">
                        <span class="nav-icon"></span>奖学金
                    </button>
                    <button class="nav-item" data-intent="internship">
                        <span class="nav-icon"></span>实习就业
                    </button>
                    <button class="nav-item" data-intent="academic_affairs">
                        <span class="nav-icon">📋</span>教务事务
                    </button>
                    <button class="nav-item" data-intent="competition">
                        <span class="nav-icon">🎯</span>竞赛活动
                    </button>
                    <button class="nav-item" data-intent="campus_life">
                        <span class="nav-icon">🏠</span>校园生活
                    </button>
                </div>
            </nav>
            <div class="sidebar-footer">
                <p>基于 DeepSeek + FastGPT</p>
                <p class="sub">RAG知识库问答系统</p>
            </div>
        </aside>

        <!-- 主聊天区域 -->
        <main class="chat-main">
            <header class="chat-header">
                <h2>💬 智能问答</h2>
                <div class="header-actions">
                    <!-- 用户信息栏 -->
                    <div class="user-info-bar" id="userInfoBar">
                        <span class="username" id="displayUsername"> 用户</span>
                        <button class="logout-btn" onclick="logout()">退出登录</button>
                    </div>
                    <button id="clearBtn" class="btn-icon" title="清空对话">🗑️</button>
                </div>
            </header>

            <div class="chat-messages" id="chatMessages">
                <!-- 欢迎消息 -->
                <div class="message bot">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <div class="message-text">
                            你好！我是校园智能办事助手，可以帮你解答课程、奖学金、实习就业、教务事务、竞赛活动和校园生活等方面的问题。请问有什么可以帮你的？
                        </div>
                        <div class="quick-replies">
                            <button class="quick-reply-btn" onclick="sendQuickReply('如何选课？')">如何选课？</button>
                            <button class="quick-reply-btn" onclick="sendQuickReply('奖学金有哪些种类？')">奖学金种类</button>
                            <button class="quick-reply-btn" onclick="sendQuickReply('补考怎么报名？')">补考报名</button>
                            <button class="quick-reply-btn" onclick="sendQuickReply('图书馆开放时间？')">图书馆时间</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="chat-input-area">
                <div class="input-container">
                    <textarea
                        id="userInput"
                        placeholder="输入你的问题..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button id="sendBtn" class="send-btn" onclick="sendMessage()">
                        发送
                    </button>
                </div>
                <div class="input-hint">按 Enter 发送，Shift+Enter 换行</div>
            </div>
        </main>

        <!-- 右侧分析面板 -->
        <aside class="analysis-panel" id="analysisPanel">
            <h3>🔍 分析结果</h3>
            <div class="analysis-content" id="analysisContent">
                <div class="analysis-placeholder">
                    发送问题后，这里将显示意图识别、信息抽取和分析结果
                </div>
            </div>
        </aside>
    </div>

    <script src="/static/js/app.js"></script>
    <script>        // 检查登录状态
        window.addEventListener('load', () => {
            const token = localStorage.getItem('access_token');
            const username = localStorage.getItem('username');
            if (token && username) {
                document.getElementById('displayUsername').textContent = `👤 ${username}`;
                document.getElementById('appContainer').style.display = 'flex';
                document.getElementById('loginPrompt').style.display = 'none';
            } else {
                document.getElementById('appContainer').style.display = 'none';
                document.getElementById('loginPrompt').style.display = 'flex';
            }
        });

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('access_token');
                localStorage.removeItem('username');
                document.cookie = 'access_token=; path=/; max-age=0';
                window.location.href = '/login';
            }
        }
    </script>
</body>
</html>
